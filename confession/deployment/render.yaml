services:
  - type: web
    name: confession-backend
    runtime: docker
    dockerfilePath: ./docker/backend.Dockerfile
    rootDir: confession
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: ADMIN_API_KEY
        sync: false
      - key: ALLOWED_ORIGINS
        value: "*"
