<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ConAn Home Screen Preview</title>
  <style>
    :root {
      --bg1: #f7efe3;
      --bg2: #d8e7f4;
      --card: #ffffff;
      --ink: #1f2a37;
      --accent: #1769aa;
      --accent-2: #0f9d8a;
      --shadow: 0 18px 40px rgba(23, 105, 170, 0.15);
      --radius: 18px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top right, var(--bg2), transparent 40%),
                  radial-gradient(circle at bottom left, #ffd5bf, transparent 38%),
                  var(--bg1);
      font-family: "Trebuchet MS", "Segoe UI", sans-serif;
      color: var(--ink);
    }

    .phone {
      width: min(92vw, 420px);
      border-radius: 28px;
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.92), rgba(255, 255, 255, 0.75));
      backdrop-filter: blur(4px);
      box-shadow: var(--shadow);
      padding: 28px 22px;
      border: 1px solid rgba(255, 255, 255, 0.7);
    }

    h1 {
      margin: 0 0 8px;
      font-size: 1.4rem;
      letter-spacing: 0.2px;
    }

    p {
      margin: 0 0 22px;
      font-size: 0.95rem;
      opacity: 0.9;
    }

    .btn {
      width: 100%;
      border: 0;
      border-radius: var(--radius);
      color: white;
      padding: 14px 16px;
      margin: 8px 0;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: transform 120ms ease, box-shadow 120ms ease;
    }

    .btn:active {
      transform: translateY(1px) scale(0.995);
    }

    .speak {
      background: linear-gradient(135deg, var(--accent), #2c87d4);
      box-shadow: 0 12px 24px rgba(23, 105, 170, 0.28);
    }

    .listen {
      background: linear-gradient(135deg, var(--accent-2), #17b6a0);
      box-shadow: 0 12px 24px rgba(15, 157, 138, 0.26);
    }

    .note {
      margin-top: 18px;
      font-size: 0.85rem;
      opacity: 0.75;
      text-align: center;
    }
  </style>
</head>
<body>
  <main class="phone">
    <h1>ConAn Home</h1>
    <p>Anonymous emotional support, voice-first.</p>
    <button class="btn speak">Speak</button>
    <button class="btn listen">Listen</button>
    <div class="note">Preview of HomeScreen.js layout</div>
  </main>
</body>
</html>
