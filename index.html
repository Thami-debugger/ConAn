<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ConAn</title>
  <style>
    :root {
      --bg1: #f7efe3;
      --bg2: #d8e7f4;
      --card: #ffffff;
      --ink: #1f2a37;
      --accent: #1769aa;
      --accent2: #0f9d8a;
      --shadow: 0 18px 40px rgba(23, 105, 170, 0.15);
      --radius: 18px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top right, var(--bg2), transparent 40%),
                  radial-gradient(circle at bottom left, #ffd5bf, transparent 38%),
                  var(--bg1);
      font-family: "Trebuchet MS", "Segoe UI", sans-serif;
      color: var(--ink);
      padding: 20px;
    }

    .phone {
      width: min(92vw, 440px);
      border-radius: 28px;
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.92), rgba(255, 255, 255, 0.78));
      box-shadow: var(--shadow);
      padding: 28px 22px;
      border: 1px solid rgba(255, 255, 255, 0.7);
    }

    h1 {
      margin: 0 0 8px;
      font-size: 1.45rem;
      letter-spacing: 0.2px;
    }

    p {
      margin: 0 0 18px;
      font-size: 0.95rem;
      opacity: 0.9;
    }

    .btn {
      width: 100%;
      border: 0;
      border-radius: var(--radius);
      color: white;
      padding: 14px 16px;
      margin: 8px 0;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      text-align: center;
      text-decoration: none;
      display: inline-block;
    }

    .speak {
      background: linear-gradient(135deg, var(--accent), #2c87d4);
      box-shadow: 0 12px 24px rgba(23, 105, 170, 0.28);
    }

    .listen {
      background: linear-gradient(135deg, var(--accent2), #17b6a0);
      box-shadow: 0 12px 24px rgba(15, 157, 138, 0.26);
    }

    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 8px;
    }

    .link {
      color: var(--accent);
      text-decoration: none;
      font-size: 0.9rem;
      font-weight: 700;
      border: 1px solid #b7cce0;
      padding: 10px 12px;
      border-radius: 12px;
      text-align: center;
      background: #f8fbff;
    }

    .status {
      margin-top: 14px;
      font-size: 0.86rem;
      opacity: 0.8;
      text-align: center;
    }
  </style>
</head>
<body>
  <main class="phone">
    <h1>ConAn</h1>
    <p>Anonymous emotional support, voice-first.</p>

    <a class="btn speak" href="/docs">Open API Docs</a>
    <a class="btn listen" href="/health">Check API Health</a>

    <div class="row">
      <a class="link" href="/">API Root</a>
      <a class="link" href="/openapi.json">OpenAPI JSON</a>
    </div>

    <div class="status">Web frontend is live. Mobile Expo app runs locally.</div>
  </main>
</body>
</html>
